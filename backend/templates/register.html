{% extends "base.html" %}

{% block title %}Register - AI Classroom{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center animate-fade-rise" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
            <div class="card-body bg-white p-4 p-md-5">
                <div class="text-center mb-4">
                    <h2 class="font-serif fs-2 text-dark mb-1 fw-bold">Create Account</h2>
                    <p class="text-muted small">Join the AI Classroom ecosystem</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label text-muted small fw-bold">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label text-muted small fw-bold">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label text-muted small fw-bold">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100 py-2 font-serif fs-5 rounded-pill shadow-sm">Join the Class</button>
                </form>
                <div class="text-center mt-4">
                    <p class="text-muted small mb-0">Already have an account? <a href="{{ url_for('auth.login') }}" class="text-dark fw-bold text-decoration-none border-bottom border-dark pb-1 ms-1">Login</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
